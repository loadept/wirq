name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: Build frontend
        run: |
          cd frontend
          bun run build

      - name: Run lint
        run: |
          golangci-lint run
      
      - name: Run tests
        run: |
          go test ./... -race
